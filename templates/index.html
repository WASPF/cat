<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Slot Cat - Premium Casino</title>
    <style>
        body { background: #050508; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: #0d0e12; padding: 20px; border-bottom: 2px solid #ffce00; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; }
        .logo { color: #ffce00; font-size: 24px; font-weight: bold; }
        
        /* Стили игрового автомата */
        .slot-machine {
            background: #1a1a2e;
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 5px solid #333;
            border-radius: 20px;
            box-shadow: 0 0 30px #ff00ff;
        }
        .reels-container {
            display: flex;
            justify-content: space-around;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .reel {
            width: 80px;
            height: 100px;
            background: #fff;
            color: #000;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-weight: bold;
        }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .btn-spin {
            background: linear-gradient(180deg, #22c55d 0%, #16a34a 100%);
            border: none; color: white; padding: 15px; font-size: 20px;
            font-weight: bold; border-radius: 10px; cursor: pointer;
        }
        .btn-spin:disabled { background: #444; cursor: not-allowed; }
        .balance-box { font-size: 24px; color: #ffce00; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🐾 SLOT CAT</div>
    <div class="balance-box">Баланс: <span id="balance">{{ balance }}</span> 🐟</div>
</div>

<div class="slot-machine">
    <div class="reels-container">
        <div id="reel1" class="reel">?</div>
        <div id="reel2" class="reel">?</div>
        <div id="reel3" class="reel">?</div>
    </div>
    
    <div class="controls">
        <div id="win-display" style="height: 30px; color: #22c55d; font-weight: bold;"></div>
        <button class="btn-spin" id="spin-button" onclick="startSpin()">SPIN</button>
    </div>
</div>

<script>
    let isSpinning = false;

    function startSpin() {
        if (isSpinning) return;
        
        const btn = document.getElementById('spin-button');
        const winDisplay = document.getElementById('win-display');
        btn.disabled = true;
        isSpinning = true;
        winDisplay.innerText = "УДАЧІ...";

        // Анимация "кручения" (визуальный эффект)
        let count = 0;
        const interval = setInterval(() => {
            const tempSymbols = ['🍒', '🍋', '7', '💎', '🍇'];
            document.getElementById('reel1').innerText = tempSymbols[Math.floor(Math.random()*5)];
            document.getElementById('reel2').innerText = tempSymbols[Math.floor(Math.random()*5)];
            document.getElementById('reel3').innerText = tempSymbols[Math.floor(Math.random()*5)];
            count++;
            if (count > 20) clearInterval(interval);
        }, 50);

        // Запрос на сервер за реальным результатом
        fetch('/api/spin', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                setTimeout(() => {
                    clearInterval(interval);
                    // Устанавливаем реальные результаты с сервера
                    const symbolMap = { '7': '7', 'BAR': '💳', 'CHERRY': '🍒', 'LEMON': '🍋', 'GRAPE': '🍇' };
                    document.getElementById('reel1').innerText = symbolMap[data.reels[0]];
                    document.getElementById('reel2').innerText = symbolMap[data.reels[1]];
                    document.getElementById('reel3').innerText = symbolMap[data.reels[2]];
                    
                    document.getElementById('balance').innerText = data.new_balance;
                    
                    if (data.win > 0) {
                        winDisplay.innerText = "ВИГРАШ: " + data.win + " 🐟";
                        winDisplay.style.color = "#ffce00";
                    } else {
                        winDisplay.innerText = "СПРОБУЙ ЩЕ";
                        winDisplay.style.color = "#f33333";
                    }
                    
                    isSpinning = false;
                    btn.disabled = false;
                }, 1100);
            })
            .catch(err => {
                alert("Помилка або мало коштів!");
                isSpinning = false;
                btn.disabled = false;
            });
    }
</script>

</body>
</html>
