<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLOT CAT - Грати Онлайн</title>
    <style>
        body {
            margin: 0;
            background: #050508;
            color: #fff;
            font-family: 'Arial', sans-serif;
        }

        /* Шапка сайта */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #0d0e12;
            border-bottom: 2px solid #ffce00;
        }

        .logo { font-size: 24px; font-weight: bold; color: #ffce00; text-shadow: 0 0 10px #ff00ff; }
        .balance-box { background: #1a2029; padding: 10px 20px; border-radius: 10px; border: 1px solid #22c55d; color: #22c55d; font-weight: bold; }

        /* Игровое поле */
        .container { padding: 40px 5%; }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #111;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
            padding-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover { border-color: #ff00ff; transform: translateY(-5px); }

        .thumb { height: 150px; background: #000; font-size: 60px; display: flex; align-items: center; justify-content: center; border-radius: 15px 15px 0 0; }

        .play-btn {
            background: #22c55d;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 80%;
        }

        .play-btn:active { transform: scale(0.95); }

        /* Уведомления */
        #alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🐾 SLOT CAT</div>
    <div class="balance-box">🐟 <span id="balance">{{ balance }}</span></div>
</header>

<div id="alert"></div>

<div class="container">
    <h1 style="color: #ffce00;">Популярні Слоти</h1>
    <div class="game-grid">
        <div class="card">
            <div class="thumb">🐱</div>
            <h3>Neon Cat</h3>
            <button class="play-btn" onclick="play()">ГРАТИ</button>
        </div>
        <div class="card">
            <div class="thumb">💎</div>
            <h3>Crystal Kitty</h3>
            <button class="play-btn" onclick="play()">ГРАТИ</button>
        </div>
        <div class="card">
            <div class="thumb">🎰</div>
            <h3>Classic Cat</h3>
            <button class="play-btn" onclick="play()">ГРАТИ</button>
        </div>
    </div>
</div>

<script>
    function play() {
        fetch('/spin', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                const alertBox = document.getElementById('alert');
                document.getElementById('balance').innerText = data.new_balance;

                alertBox.style.display = 'block';
                if (data.status === 'win') {
                    alertBox.style.background = '#22c55d';
                    alertBox.innerText = 'ВИГРАШ: ' + data.win_amount + ' 🐟';
                } else if (data.status === 'lose') {
                    alertBox.style.background = '#f33333';
                    alertBox.innerText = 'НЕВДАЧА';
                } else {
                    alertBox.style.background = '#ffce00';
                    alertBox.innerText = data.message;
                }
                
                setTimeout(() => { alertBox.style.display = 'none'; }, 2000);
            });
    }
</script>

</body>
</html>
